name = "vectors_1m_hot"
namespaces = 1
duration = "30m"
description = """
This benchmark evaluates a vector search query, returning topk=10 ANN results.

Embeddings have 1024 dimensions and are pulled from the Cohere Wikipedia
dataset:
https://huggingface.co/datasets/Cohere/wikipedia-2023-11-embed-multilingual-v3

When generating queries, the query vectors are pseudorandomly generated.
"""

[setup]
namespace_key = "vectors_1m"
wait_for_indexing = true
document_count = 1_000_000
datasource = "CohereWikipediaEmbeddings"
document_template = """
{
    "id": {{ id }},
    "vector": {{ vector 1024 }}
}
"""
upsert_template = """
{
    "upsert_rows": [
        {{ .UpsertBatchPlaceholder }}
    ],
    "distance_metric": "euclidean_squared",
    "disable_backpressure": true,
    "schema": {"attr": {"type": "string", "filterable": true}}
}
"""

[workload.query.ann]
qps = 32
datasource = "random"
template = """
{
    "top_k": 10,
    "rank_by": ["vector", "ANN", {{ vector 1024 }}]
}
"""
