name = "vector_100m_2048_hot"
namespaces = 1
duration = "30m"
description = """
This benchmark evaluates 2048-dimensional vector ANN search with a warm cache
over 100 million documents. Each request runs a top-k=10 ANN query against the
MSMarco query embedding.

Documents and queries are pulled from the MSMarco dataset:
https://huggingface.co/datasets/Cohere/msmarco-v2.1-embed-english-v3

After seeding the namespace, the benchmark waits for indexing to complete and
the cache to reach a 100% hit ratio before measuring query throughput.
"""

[setup]
wait_for_indexing = true
warm_cache = true
wait_for_cache_hit_ratio = 1.00
document_count = 100_000_000
datasource = "CohereMSMarco"
document_template = """
{
    "id": {{ id }},
    "vector": {{ vector 2048 }},
    "text": {{ json (text) }}
}
"""
upsert_template = """
{
    "upsert_rows": [
        {{ .UpsertBatchPlaceholder }}
    ],
    "distance_metric": "cosine_distance",
    "disable_backpressure": true,
    "schema": {
        "vector": {"type": "[2048]f16", "ann": true},
        "text": {"type": "string", "full_text_search": true}
    }
}
"""

[workload.query.hybrid]
qps = 500
concurrency = 128
datasource = "CohereMSMarco"
template = """
{{ $q := query }}
{
    "queries": [
        {
            "top_k": 10,
            "rank_by": ["vector", "ANN", {{ $q.Vector 2048 }}]
        }
    ],
    "consistency": {"level": "eventual"}
}
"""
