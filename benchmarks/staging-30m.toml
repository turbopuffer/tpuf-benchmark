name = "staging_30m"
namespaces = 1
duration = "10m"
description = """
30M-document seed for the staging cluster.

Real 1024-dim Cohere Wikipedia embeddings plus 10 synthetic, mostly-filterable
attributes covering low/medium/high cardinality strings and ints. Intended
primarily as a data seed; the query workload below is a light ANN load so the
run does something useful after seeding (interrupt or shorten --duration if you
only want the data loaded).
"""

[setup]
wait_for_indexing = true
warm_cache = true
wait_for_cache_hit_ratio = 1.00
document_count = 30_000_000
datasource = "CohereWikipediaEmbeddings"
document_template = """
{
    "id": {{ id }},
    "vector": {{ vector 1024 }},
    "category": {{ json (string_with_cardinality 12 8) }},
    "subcategory": {{ json (string_with_cardinality 16 200) }},
    "tag": {{ json (string_with_cardinality 10 100) }},
    "region_code": {{ json (string_with_cardinality 6 40) }},
    "author_id": {{ json (uuid) }},
    "price_cents": {{ number_between 0 100000 }},
    "rating": {{ number_between 0 5 }},
    "views": {{ number_between 0 1000000 }},
    "score": {{ number_between 0 1000 }},
    "is_active": {{ number_between 0 2 }}
}
"""
upsert_template = """
{
    "upsert_rows": [
        {{ .UpsertBatchPlaceholder }}
    ],
    "distance_metric": "cosine_distance",
    "disable_backpressure": true,
    "schema": {
        "category": {"type": "string", "filterable": true},
        "subcategory": {"type": "string", "filterable": true},
        "tag": {"type": "string", "filterable": true},
        "region_code": {"type": "string", "filterable": true},
        "author_id": {"type": "string", "filterable": true},
        "price_cents": {"type": "int", "filterable": true},
        "rating": {"type": "int", "filterable": true},
        "views": {"type": "int", "filterable": true},
        "score": {"type": "int", "filterable": true},
        "is_active": {"type": "int", "filterable": true}
    }
}
"""

[workload.query.ann]
qps = 10
datasource = "random"
template = """
{
    "top_k": 1000,
    "rank_by": ["vector", "ANN", {{ vector 1024 }}],
    "filters": [["category", "NotEq", "a00000000000"]]
}
"""
